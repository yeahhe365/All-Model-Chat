name: Feature request
description: Suggest an improvement or new capability.
title: 'feat: '
labels: ['enhancement', 'needs-triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What workflow would this improve?
      placeholder: Explain the user need or limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other designs if you have considered them.
    validations:
      required: false
